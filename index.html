<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmOrbit - OMDb Enhanced</title>

<style>
body{margin:0;font-family:sans-serif;background:#141414;color:#fff}
.navbar{display:flex;gap:10px;padding:10px;background:#000}
.logo{flex:1;text-align:center;color:#e50914;font-weight:bold}
input{padding:8px;width:100%}
h2{padding:10px}
.row{display:flex;overflow-x:auto;gap:10px;padding:10px}
.movie{width:140px;cursor:pointer}
.movie img{width:100%;height:200px;object-fit:cover}
#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;overflow:auto;padding:20px}
button{background:#e50914;color:#fff;border:none;padding:8px;cursor:pointer}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">FilmOrbit</div>
<input id="search" placeholder="Search movies...">
</div>

<h2>🔥 Trending</h2>
<div id="trending" class="row"></div>

<h2>⭐ Popular</h2>
<div id="popular" class="row"></div>

<h2>🏆 Top Rated</h2>
<div id="top" class="row"></div>

<h2>🔎 Search Results</h2>
<div id="results" class="row"></div>

<div id="modal"></div>

<script>
const API="https://www.omdbapi.com/?apikey=72bd5552";

const modal=document.getElementById("modal");

/* CURATED LISTS (IMDb IDs) */
const trendingIDs=[
"tt15398776","tt9362722","tt1745960","tt0816692","tt0468569"
];

const popularIDs=[
"tt4154796","tt0848228","tt1375666","tt0133093","tt0109830"
];

const topIDs=[
"tt0111161","tt0068646","tt0071562","tt0468569","tt0050083"
];

/* LOAD ROW */
function loadRow(ids,container){
const el=document.getElementById(container);
ids.forEach(id=>{
fetch(API+"&i="+id)
.then(r=>r.json())
.then(m=>{
const div=document.createElement("div");
div.className="movie";
div.innerHTML=`
<img src="${m.Poster}">
<p>${m.Title}</p>`;
div.onclick=()=>showDetails(id);
el.appendChild(div);
});
});
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
const q=e.target.value.trim();
if(q.length<2)return;

fetch(API+"&s="+q)
.then(r=>r.json())
.then(d=>{
const res=document.getElementById("results");
res.innerHTML="";
if(d.Search){
d.Search.forEach(m=>{
const div=document.createElement("div");
div.className="movie";
div.innerHTML=`
<img src="${m.Poster}">
<p>${m.Title}</p>`;
div.onclick=()=>showDetails(m.imdbID);
res.appendChild(div);
});
}
});
});

/* DETAILS */
function showDetails(id){
modal.style.display="block";
modal.innerHTML="Loading...";

fetch(API+"&i="+id)
.then(r=>r.json())
.then(m=>{

modal.innerHTML=`
<h1>${m.Title}</h1>
<button onclick="modal.style.display='none'">Close</button>

<img src="${m.Poster}" width="200">

<p><b>⭐ IMDb:</b> ${m.imdbRating}</p>
<p><b>🍅 Rotten Tomatoes:</b> ${
(m.Ratings.find(r=>r.Source==="Rotten Tomatoes")||{}).Value || "N/A"
}</p>

<p><b>📅 Year:</b> ${m.Year}</p>
<p><b>🎬 Genre:</b> ${m.Genre}</p>
<p><b>🎭 Actors:</b> ${m.Actors}</p>
<p><b>🎥 Director:</b> ${m.Director}</p>

<h3>Plot</h3>
<p>${m.Plot}</p>
`;
});
}

/* INIT */
loadRow(trendingIDs,"trending");
loadRow(popularIDs,"popular");
loadRow(topIDs,"top");

</script>

</body>
</html>
