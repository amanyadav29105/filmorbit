<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmOrbit - TMDB Only</title>

<style>
/* (Same styles as your original — unchanged for brevity) */
body{font-family:sans-serif;background:#141414;color:#fff;margin:0}
.navbar{display:flex;gap:10px;padding:10px;background:#000}
.home-btn{background:#e50914;color:#fff;border:none;padding:8px}
.logo{flex:1;text-align:center;font-weight:bold}
.search-box input{width:100%;padding:8px}
.results{display:flex;overflow-x:auto;gap:10px;padding:10px}
.movie{width:140px;cursor:pointer}
.movie img{width:100%;height:200px;object-fit:cover}
#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;overflow:auto;padding:20px}
</style>
</head>

<body>

<div class="navbar">
<button class="home-btn" onclick="goHome()">Home</button>
<div class="logo">FilmOrbit</div>
<div class="search-box">
<input id="searchInput" placeholder="Search movies...">
<div id="searchResults"></div>
</div>
</div>

<div id="banner"></div>

<h2>Trending</h2>
<div id="trending" class="results"></div>

<h2>Popular</h2>
<div id="popular" class="results"></div>

<h2>Top Rated</h2>
<div id="toprated" class="results"></div>

<div id="modal"></div>

<script>
const TMDB_KEY = "466f6ec156d5fdcd6a7345d4ae483add";
const BASE = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";

let trendingMovies = [];
let bannerIndex = 0;

const modal = document.getElementById("modal");

/* HOME */
function goHome(){
    modal.style.display="none";
    modal.innerHTML="";
}

/* DISPLAY MOVIES */
function displayMovies(movies,id){
    const el=document.getElementById(id);
    el.innerHTML="";
    movies.forEach(m=>{
        const div=document.createElement("div");
        div.className="movie";
        div.innerHTML=`
        <img src="${m.poster_path?IMG+m.poster_path:''}">
        <p>${m.title}</p>`;
        div.onclick=()=>fetchDetails(m.id);
        el.appendChild(div);
    });
}

/* BANNER */
function startBanner(){
    const banner=document.getElementById("banner");
    setInterval(()=>{
        const m=trendingMovies[bannerIndex];
        banner.style.background=`url(${IMG+m.backdrop_path}) center/cover`;
        banner.innerHTML=`<h1>${m.title}</h1>`;
        banner.onclick=()=>fetchDetails(m.id);
        bannerIndex=(bannerIndex+1)%trendingMovies.length;
    },4000);
}

/* DETAILS (TMDB ONLY) */
function fetchDetails(id){
modal.style.display="block";
modal.innerHTML="Loading...";

Promise.all([
fetch(`${BASE}/movie/${id}?api_key=${TMDB_KEY}`).then(r=>r.json()),
fetch(`${BASE}/movie/${id}/videos?api_key=${TMDB_KEY}`).then(r=>r.json()),
fetch(`${BASE}/movie/${id}/credits?api_key=${TMDB_KEY}`).then(r=>r.json()),
fetch(`${BASE}/movie/${id}/similar?api_key=${TMDB_KEY}`).then(r=>r.json())
])
.then(([movie,videos,credits,similar])=>{

const rating=movie.vote_average?.toFixed(1)||"N/A";
const votes=movie.vote_count||"N/A";
const popularity=movie.popularity?.toFixed(0)||"N/A";

const trailer=videos.results.find(v=>v.type==="Trailer");

const castHTML=credits.cast.slice(0,10).map(c=>`
<div>
<img src="${c.profile_path?IMG+c.profile_path:''}" width="80">
<p>${c.name}</p>
</div>`).join("");

const similarHTML=similar.results.slice(0,10).map(s=>`
<div onclick="fetchDetails(${s.id})">
<img src="${s.poster_path?IMG+s.poster_path:''}" width="100">
<p>${s.title}</p>
</div>`).join("");

modal.innerHTML=`
<h1>${movie.title}</h1>
<button onclick="goHome()">Close</button>

<img src="${IMG+movie.poster_path}" width="200">

<p><b>⭐ Rating:</b> ${rating}/10</p>
<p><b>🗳 Votes:</b> ${votes}</p>
<p><b>🔥 Popularity:</b> ${popularity}</p>
<p><b>📅 Release:</b> ${movie.release_date}</p>

${trailer?`<button onclick="window.open('https://youtube.com/watch?v=${trailer.key}')">Watch Trailer</button>`:''}

<h3>Overview</h3>
<p>${movie.overview}</p>

<h3>Cast</h3>
<div style="display:flex;gap:10px;overflow:auto">${castHTML}</div>

<h3>Similar</h3>
<div style="display:flex;gap:10px;overflow:auto">${similarHTML}</div>
`;
});
}

/* LOAD DATA */
function load(){
fetch(`${BASE}/trending/movie/week?api_key=${TMDB_KEY}`)
.then(r=>r.json())
.then(d=>{
trendingMovies=d.results;
displayMovies(d.results,"trending");
startBanner();
});

fetch(`${BASE}/movie/popular?api_key=${TMDB_KEY}`)
.then(r=>r.json())
.then(d=>displayMovies(d.results,"popular"));

fetch(`${BASE}/movie/top_rated?api_key=${TMDB_KEY}`)
.then(r=>r.json())
.then(d=>displayMovies(d.results,"toprated"));
}

load();
</script>

</body>
</html>
