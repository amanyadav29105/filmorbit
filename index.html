<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmOrbit - OMDb</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:#fff;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:12px;
    background:#000;
}
.logo{
    color:#e50914;
    font-size:22px;
    font-weight:bold;
}
input{
    padding:8px;
    border:none;
    border-radius:4px;
}

/* Grid */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
    padding:12px;
}

.movie{
    cursor:pointer;
}
.movie img{
    width:100%;
    border-radius:6px;
}

/* Modal */
#modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:none;
    overflow:auto;
    padding:20px;
}
button{
    background:#e50914;
    color:white;
    border:none;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">FilmOrbit</div>
    <input id="search" placeholder="Search movies...">
</div>

<div id="movies" class="container"></div>

<div id="modal"></div>

<script>
const KEY="72bd5552"; // your OMDb key

// Search movies
document.getElementById("search").addEventListener("input",function(){
    let q=this.value;
    if(q.length<2) return;

    fetch(`https://www.omdbapi.com/?apikey=${KEY}&s=${q}`)
    .then(r=>r.json())
    .then(data=>{
        const container=document.getElementById("movies");
        container.innerHTML="";

        if(data.Search){
            data.Search.forEach(m=>{
                const div=document.createElement("div");
                div.className="movie";
                div.innerHTML=`
                    <img src="${m.Poster}">
                    <p>${m.Title}</p>
                `;
                div.onclick=()=>details(m.imdbID);
                container.appendChild(div);
            });
        }
    });
});

// Movie details
function details(id){
    const modal=document.getElementById("modal");
    modal.style.display="block";
    modal.innerHTML="Loading...";

    fetch(`https://www.omdbapi.com/?apikey=${KEY}&i=${id}`)
    .then(r=>r.json())
    .then(m=>{
        modal.innerHTML=`
        <button onclick="closeModal()">Close</button>
        <h1>${m.Title}</h1>
        <img src="${m.Poster}" width="200">

        <p>⭐ IMDb: ${m.imdbRating}</p>
        <p>🍅 Rotten Tomatoes: ${
            m.Ratings.find(r=>r.Source==="Rotten Tomatoes")?.Value || "N/A"
        }</p>

        <p>📅 ${m.Year}</p>
        <p>🎭 ${m.Actors}</p>
        <p>${m.Plot}</p>
        `;
    });
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
